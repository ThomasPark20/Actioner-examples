title: Akira Ransomware Locker Execution Pattern
id: f6a7b8c9-d0e1-4f2a-3b4c-5d6e7f809102
status: experimental
description: >
    Detects execution of Akira ransomware locker binary with characteristic command-line
    flags (-p for path and -n for thread count), as observed in the Bumblebee/AdaptixC2/Akira
    intrusion (DFIR Report case TB36726). The threat actor deployed locker.exe with
    -p=<drive> -n=<threads> to encrypt targeted volumes.
references:
    - https://thedfirreport.com/2026/06/29/from-bing-search-to-ransomware-bumblebee-and-adaptixc2-deliver-akira-3/
author: Actioner
date: 2026-06-30
tags:
    - attack.t1486
logsource:
    category: process_creation
    product: windows
detection:
    selection_name:
        Image|endswith:
            - '\locker.exe'
            - '\win.exe'
    selection_flags:
        CommandLine|contains:
            - '-p='
            - '-n='
    condition: selection_name and selection_flags
falsepositives:
    - Legitimate software named locker.exe using similar flags (unlikely with this combination)
level: critical

title: BlueHammer - RstrtMgr.dll Exclusive Handle Acquisition
id: e5f6a7b8-c9d0-4e1f-2a3b-4c5d6e7f8a9b
status: experimental
description: >
    Detects loading of RstrtMgr.dll (Restart Manager) with a batch oplock as a tripwire,
    a technique used by the BlueHammer exploit (CVE-2026-33825) to detect when Defender
    interacts with a target file. The exploit opens RstrtMgr.dll with a batch oplock
    to create a pause point in Defender's remediation flow.
references:
    - https://www.bleepingcomputer.com/news/security/cisa-windows-bluehammer-flaw-now-exploited-by-ransomware-gangs/
    - https://www.cyderes.com/howler-cell/windows-zero-day-bluehammer
    - https://github.com/Nightmare-Eclipse/BlueHammer
author: Actioner
date: 2026-06-30
tags:
    - attack.privilege_escalation
    - attack.t1068
    - attack.defense_evasion
    - attack.t1562
    - cve.2026-33825
logsource:
    category: file_event
    product: windows
detection:
    selection_rstrtmgr:
        TargetFilename|endswith: '\RstrtMgr.dll'
    selection_temp_path:
        TargetFilename|contains:
            - '\AppData\Local\Temp\'
            - '\Users\'
    condition: selection_rstrtmgr and selection_temp_path
falsepositives:
    - Legitimate applications copying RstrtMgr.dll to temporary directories (uncommon)
level: high

---
title: ScarCruft NarwhalRAT - Naverwhale Working Directory Creation
id: f6c8bd37-ca92-4f4e-ab16-7cad3e5f8a2b
status: experimental
description: >
  Detects file operations in the AppData naverwhale directory used by
  NarwhalRAT to stage harvested data, mimicking the legitimate Naver
  Whale browser.
references:
    - https://www.genians.co.kr/en/blog/threat_intelligence/narwhalrat
    - https://thehackernews.com/2026/06/fake-microsoft-alerts-used-to-deploy.html
author: Actioner
date: 2026-06-16
tags:
    - attack.collection
    - attack.t1074.001
    - attack.t1564.001
logsource:
    category: file_event
    product: windows
detection:
    selection_naverwhale:
        TargetFilename|contains: '\AppData\Roaming\naverwhale\'
    filter_legitimate:
        Image|contains: '\Naver\Whale\'
    condition: selection_naverwhale and not filter_legitimate
falsepositives:
    - Legitimate Naver Whale browser portable installations using non-standard paths
level: high

---
title: ScarCruft NarwhalRAT - Obfuscated Batch Script KHjWFcsE Execution
id: a7d9ce48-db03-4a5f-bc27-8dbe4f6a9b3c
status: experimental
description: >
  Detects execution of the NarwhalRAT obfuscated batch dropper (KHjWFcsE.bat)
  or CMD processes combining environment variable substring obfuscation with
  campaign-specific artifacts (temp012.zip, userscreen.exe, config.cat).
references:
    - https://www.genians.co.kr/en/blog/threat_intelligence/narwhalrat
    - https://thehackernews.com/2026/06/fake-microsoft-alerts-used-to-deploy.html
author: Actioner
date: 2026-06-16
tags:
    - attack.t1027.010
    - attack.execution
    - attack.t1059.003
logsource:
    category: process_creation
    product: windows
detection:
    selection_bat:
        Image|endswith: '\cmd.exe'
        CommandLine|contains: 'KHjWFcsE.bat'
    selection_obfuscation_with_artifact:
        Image|endswith: '\cmd.exe'
        CommandLine|re: '(%\w+:~\d+,\d+%){5,}'
        CommandLine|contains:
            - 'temp012.zip'
            - 'userscreen.exe'
            - 'config.cat'
            - 'UserInerfacePicture'
    condition: selection_bat or selection_obfuscation_with_artifact
falsepositives:
    - None expected - combines obfuscation technique with campaign-specific filenames
level: high

title: Atomic Arch Systemd Service Persistence
id: e9ed6312-748f-4057-810f-44ac086fd67c
status: experimental
description: |
    Detects creation of systemd service unit files by processes running from
    paths consistent with Atomic Arch persistence locations. The malware drops
    its binary under /var/lib/ (root) or ~/.config/ (non-root) and then creates
    a systemd service unit to maintain persistence. This rule fires when a
    process executing from /var/lib/ or a user .config directory writes a
    .service file to standard systemd unit directories.
references:
    - https://ioctl.fail/preliminary-analysis-of-aur-malware/
    - https://thehackernews.com/2026/06/over-400-arch-linux-aur-packages.html
author: Actioner
date: 2026-06-16
modified: 2026-06-16
tags:
    - attack.persistence
    - attack.t1543.002
logsource:
    category: file_event
    product: linux
detection:
    selection_system_service:
        TargetFilename|startswith: '/etc/systemd/system/'
        TargetFilename|endswith: '.service'
    selection_user_service:
        TargetFilename|contains: '/.config/systemd/user/'
        TargetFilename|endswith: '.service'
    selection_suspicious_image_varlib:
        Image|startswith: '/var/lib/'
    selection_suspicious_image_userconfig:
        Image|contains: '/.config/'
    filter_known_packages:
        Image|startswith:
            - '/usr/bin/'
            - '/usr/lib/systemd/'
            - '/usr/lib/'
    condition: >
        (selection_system_service or selection_user_service)
        and (selection_suspicious_image_varlib or selection_suspicious_image_userconfig)
        and not filter_known_packages
falsepositives:
    - Legitimate software installed under /var/lib/ that creates systemd services
    - Development tools or CI runners in user .config directories
level: high

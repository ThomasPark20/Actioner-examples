title: Atomic Arch PKGBUILD Malicious Dependency Injection
id: d3d91d05-8d29-401d-bf35-b93815d1024a
status: experimental
description: |
    Detects process creation events where npm or bun is invoked to install
    malicious packages (atomic-lockfile, js-digest, lockfile-js) associated
    with the Atomic Arch AUR supply chain attack (Sonatype-2026-003775).
references:
    - https://thehackernews.com/2026/06/over-400-arch-linux-aur-packages.html
    - https://www.sonatype.com/blog/atomic-arch-npm-campaign-adds-malicious-dependency
    - https://ioctl.fail/preliminary-analysis-of-aur-malware/
author: Actioner
date: 2026-06-16
tags:
    - attack.execution
    - attack.t1059.007
    - attack.initial-access
    - attack.t1195.002
logsource:
    category: process_creation
    product: linux
detection:
    selection_npm:
        Image|endswith: '/npm'
        CommandLine|contains:
            - 'atomic-lockfile'
            - 'js-digest'
            - 'lockfile-js'
    selection_bun:
        Image|endswith: '/bun'
        CommandLine|contains:
            - 'atomic-lockfile'
            - 'js-digest'
            - 'lockfile-js'
    selection_preinstall_hook:
        Image|endswith: '/deps'
        CurrentDirectory|contains: 'src/hooks'
    condition: selection_npm or selection_bun or selection_preinstall_hook
falsepositives:
    - Legitimate packages named atomic-lockfile (unlikely - npm package was removed)
level: critical

title: Atomic Arch eBPF Rootkit Pinned Map Access
id: ac4825eb-eb57-4cc6-9e61-41e6430e89a0
status: experimental
description: |
    Detects file access or creation of BPF pinned maps at /sys/fs/bpf/hidden_*
    which are characteristic of the Atomic Arch eBPF rootkit component. The rootkit
    pins maps named hidden_pids, hidden_names, and hidden_inodes to persist its
    hiding configuration.
references:
    - https://ioctl.fail/preliminary-analysis-of-aur-malware/
    - https://corgea.com/research/atomic-arch-aur-atomic-lockfile-js-digest-ebpf-rootkit
author: Actioner
date: 2026-06-16
tags:
    - attack.defense_evasion
    - attack.t1014
    - attack.t1564.001
logsource:
    category: file_event
    product: linux
detection:
    selection:
        TargetFilename|startswith: '/sys/fs/bpf/hidden_'
    condition: selection
falsepositives:
    - Custom eBPF programs using the prefix hidden_ in map names (uncommon)
level: critical

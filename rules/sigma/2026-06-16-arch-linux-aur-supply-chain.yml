title: Atomic Arch Data Exfiltration via temp.sh
id: 45d7b946-ecff-4ea6-aba8-71ffff8a5cd4
status: experimental
description: |
    Detects network connections or process creation involving temp.sh, a file
    sharing service used by the Atomic Arch malware for credential exfiltration.
    The malware uploads stolen data via HTTP POST to temp.sh/upload.
    DETECTION GAP: The Atomic Arch payload uses an internal Rust HTTP client
    (not curl/wget) for uploads, so process_creation detection will only catch
    cases where the malware shells out or where defenders search for the
    domain in DNS/proxy logs. Pair with the Suricata HTTP rule for network-level
    coverage of the temp.sh upload pattern.
references:
    - https://ioctl.fail/preliminary-analysis-of-aur-malware/
    - https://thehackernews.com/2026/06/over-400-arch-linux-aur-packages.html
author: Actioner
date: 2026-06-16
tags:
    - attack.exfiltration
    - attack.t1041
logsource:
    category: process_creation
    product: linux
detection:
    selection_curl:
        Image|endswith:
            - '/curl'
            - '/wget'
        CommandLine|contains: 'temp.sh'
    selection_generic:
        CommandLine|contains: 'temp.sh/upload'
    condition: selection_curl or selection_generic
falsepositives:
    - Legitimate use of temp.sh file sharing service by developers
level: high

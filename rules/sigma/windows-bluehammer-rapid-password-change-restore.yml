title: BlueHammer - Administrator Password Reset via SAM API
id: b2c3d4e5-f6a7-4b8c-9d0e-1f2a3b4c5d6e
status: experimental
description: >
    Detects password change events (Event IDs 4723/4724) targeting the local Administrator
    account. The BlueHammer exploit (CVE-2026-33825) resets the Administrator password via
    SamiChangePasswordUser() to a hardcoded value, uses LogonUserEx() to obtain a SYSTEM
    token, then restores the original NTLM hash. Any password change on the built-in
    Administrator account from a non-standard process warrants investigation. Correlate
    with samlib.dll loads from non-LSASS processes for higher confidence.
references:
    - https://www.bleepingcomputer.com/news/security/cisa-windows-bluehammer-flaw-now-exploited-by-ransomware-gangs/
    - https://www.cyderes.com/howler-cell/windows-zero-day-bluehammer
    - https://github.com/Nightmare-Eclipse/BlueHammer
author: Actioner
date: 2026-06-30
tags:
    - attack.privilege_escalation
    - attack.t1068
    - attack.credential_access
    - attack.t1003.002
    - cve.2026-33825
logsource:
    product: windows
    service: security
detection:
    selection:
        EventID:
            - 4723
            - 4724
        TargetUserName: 'Administrator'
    filter_known_sources:
        SubjectUserName|endswith: '$'
    condition: selection and not filter_known_sources
falsepositives:
    - Legitimate password resets of the local Administrator account by human operators
    - Automated password rotation tools (LAPS, CyberArk)
level: medium

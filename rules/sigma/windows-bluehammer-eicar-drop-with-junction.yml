title: BlueHammer - EICAR Test File Drop Followed by Junction Point Creation
id: a7b8c9d0-e1f2-4a3b-4c5d-6e7f8a9b0c1d
status: experimental
description: >
    Detects creation of files matching the EICAR test string pattern in temporary
    directories. The BlueHammer exploit (CVE-2026-33825) drops an EICAR test file
    named foo.exe to trigger Microsoft Defender's real-time protection engine, which
    initiates the remediation flow that the exploit then races against using NTFS
    junction points to redirect privileged writes to C:\Windows\System32.
references:
    - https://www.bleepingcomputer.com/news/security/cisa-windows-bluehammer-flaw-now-exploited-by-ransomware-gangs/
    - https://www.cyderes.com/howler-cell/windows-zero-day-bluehammer
    - https://github.com/Nightmare-Eclipse/BlueHammer
author: Actioner
date: 2026-06-30
tags:
    - attack.privilege_escalation
    - attack.t1068
    - attack.defense_evasion
    - attack.t1562.001
    - cve.2026-33825
logsource:
    category: file_event
    product: windows
detection:
    selection:
        TargetFilename|endswith: '\foo.exe'
        TargetFilename|contains:
            - '\AppData\Local\Temp\'
            - '\Temp\'
    condition: selection
falsepositives:
    - Security testing tools that intentionally drop EICAR samples
    - Antivirus product testing
level: medium

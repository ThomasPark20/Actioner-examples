date: 2026/06/22
tags:
    - attack.t1090
logsource:
    category: process_creation
    product: windows
detection:
    selection:
        Image|endswith: '\ugate.exe'
    condition: selection
falsepositives:
    - Legitimate software using a binary named ugate.exe (uncommon)
level: high

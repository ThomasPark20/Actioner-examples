title: macOS.Gaslight - Telegram Bot API C2 Communication
id: e5f6a7b8-c9d0-1234-efab-345678901234
status: experimental
description: Detects process creation with command lines containing Telegram Bot API getUpdates endpoint, consistent with macOS.Gaslight C2 polling mechanism.
references:
    - https://www.sentinelone.com/labs/macos-gaslight-rust-backdoor-turns-prompt-injection-on-the-analyst-not-the-sandbox/
author: Actioner CTI
date: 2026-06-25
tags:
    - attack.command_and_control
    - attack.t1102.002
logsource:
    category: process_creation
    product: macos
detection:
    selection:
        CommandLine|contains|all:
            - 'api.telegram.org'
            - 'getUpdates'
    condition: selection
falsepositives:
    - Legitimate Telegram bots running on macOS
level: medium

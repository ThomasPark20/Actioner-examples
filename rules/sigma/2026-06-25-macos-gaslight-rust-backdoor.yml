title: macOS.Gaslight - Python Runtime Staging from astral-sh
id: d4e5f6a7-b8c9-0123-defa-234567890123
status: experimental
description: Detects download or execution of cpython-3.10 standalone builds from astral-sh/python-build-standalone, used by macOS.Gaslight to stage a Python runtime for its embedded stealer.
references:
    - https://www.sentinelone.com/labs/macos-gaslight-rust-backdoor-turns-prompt-injection-on-the-analyst-not-the-sandbox/
author: Actioner CTI
date: 2026-06-25
tags:
    - attack.execution
    - attack.t1059.006
    - attack.resource_development
    - attack.t1608.001
logsource:
    category: process_creation
    product: macos
detection:
    selection_curl:
        CommandLine|contains|all:
            - 'astral-sh'
            - 'python-build-standalone'
            - 'cpython-3.10'
    condition: selection_curl
falsepositives:
    - Developers legitimately using astral-sh python-build-standalone
level: medium

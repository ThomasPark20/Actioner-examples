title: macOS.Gaslight - Python Stealer Data Collection Archive
id: c3d4e5f6-a7b8-9012-cdef-123456789012
status: experimental
description: Detects creation of the collected_data.zip archive in a temp directory, consistent with the macOS.Gaslight embedded Python stealer staging exfiltration data.
references:
    - https://www.sentinelone.com/labs/macos-gaslight-rust-backdoor-turns-prompt-injection-on-the-analyst-not-the-sandbox/
author: Actioner CTI
date: 2026-06-25
tags:
    - attack.collection
    - attack.t1560.001
    - attack.exfiltration
    - attack.t1041
logsource:
    category: file_event
    product: macos
detection:

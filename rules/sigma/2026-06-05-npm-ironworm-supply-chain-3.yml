# Sigma rule for IronWorm npm supply chain attack — GitHub Actions workflow modification
# Generated by Actioner | 2026-06-05 | Version 1.1 (FINAL)
# revision: v1.1 — renamed title to match actual detection logic (workflow file modification,
#   not toJSON detection); replaced T1588.004 with T1020; downgraded level from critical to high
---
title: IronWorm GitHub Actions Workflow Modification from node_modules
id: 3d8a5f1c-b6e2-4c7d-9a0f-1e4b7c3d6a82
status: experimental
description: >
    Detects modification of GitHub Actions workflow YAML files by a process
    originating from node_modules or the tools/setup binary, indicating
    IronWorm's workflow hijacking technique for CI/CD secret exfiltration.
references:
    - https://research.jfrog.com/post/iron-worm-shai-hulud-rustier-cousin/
    - https://www.bleepingcomputer.com/news/security/new-ironworm-malware-hits-36-packages-in-npm-supply-chain-attack/
author: Actioner
date: 2026/06/05
tags:
    - attack.t1020
    - attack.t1560.001
logsource:
    category: file_event
    product: linux
detection:
    selection_path:
        TargetFilename|contains: '.github/workflows/'
        TargetFilename|endswith: '.yml'
    selection_process:
        Image|contains:
            - 'node_modules'
            - 'tools/setup'
    condition: selection_path and selection_process
falsepositives:
    - CI/CD automation tools modifying workflow files legitimately
level: high

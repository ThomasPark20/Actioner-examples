title: npm or node spawning a network downloader during package install
id: 6f3a1c4e-2b7d-4f6a-9c1e-8d2a7b4e1f90
status: experimental
description: Detects npm/node processes spawning a command-line network downloader (curl or wget), consistent with the colortoolsv2/mimelib2 npm loader fetching an Ethereum-smart-contract-resolved second stage (ReversingLabs, 2025).
references:
    - https://www.reversinglabs.com/blog/ethereum-contracts-malicious-code
    - https://thehackernews.com/2025/09/malicious-npm-packages-exploit-ethereum.html
author: Actioner
date: 2026/05/30
tags:
    - attack.t1059.007
    - attack.t1105
    - attack.t1195.002
logsource:
    category: process_creation
    product: linux
detection:
    selection:
        ParentImage|endswith:
            - '/node'
            - '/npm'
            - '/npx'
        Image|endswith:
            - '/curl'
            - '/wget'
    condition: selection
falsepositives:
    - Legitimate build/install scripts that fetch assets
level: low

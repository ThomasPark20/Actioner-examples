title: Pyrogram Backdoor File secret.py Creation
id: 2b4c6d8e-9f0a-1b2c-3d4e-5f6a7b8c9d0e
status: experimental
description: >
    Detects creation of the backdoor file secret.py within the pyrogram helpers directory,
    as used in Operation Navy Ghost supply chain attack. This file does not exist in the
    legitimate Pyrogram package.
references:

title: Malicious npm PostCSS RAT - Registry Persistence via csshost Run Key
id: b8d4f2a1-5c3e-4f9b-a0d2-4e6f8b0c1d3a
status: experimental
description: >
    Detects the RAT establishing persistence by creating a registry Run key named
    'csshost' under HKCU, as used by the postcss-minify-selector-parser RAT.
references:
    - https://research.jfrog.com/post/from-postcss-typosquat-to-windows-rat/
author: Actioner DRAFT
date: 2026-06-25
tags:
    - attack.persistence
    - attack.t1547.001
logsource:
    category: registry_set
    product: windows
detection:
    selection:
        TargetObject|endswith: '\CurrentVersion\Run\csshost'
    condition: selection
falsepositives:
    - Unknown legitimate software using the exact registry value name 'csshost'
level: high
---
title: Malicious npm PostCSS RAT - Temp Directory File Artifacts
id: c9e5a3b2-6d4f-4a0c-b1e3-5f7a9c1d2e4b
status: experimental
description: >
    Detects creation of characteristic file artifacts in the temp directory associated
    with the PostCSS RAT payload extraction and tracking files (.store, .host, winPatch).
references:
    - https://research.jfrog.com/post/from-postcss-typosquat-to-windows-rat/
author: Actioner DRAFT
date: 2026-06-25
tags:
    - attack.execution
    - attack.t1074.001
logsource:
    category: file_event
    product: windows
detection:
    selection_winpatch:
        TargetFilename|contains: '\winPatch'
    selection_tracking:
        TargetFilename|endswith:
            - '\.store'
            - '\.host'
        TargetFilename|contains: '\Temp\'
    condition: selection_winpatch or selection_tracking
falsepositives:
    - Other software creating .store or .host files in temp directories
level: medium
